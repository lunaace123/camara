<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lunahappy · random video (WebView ready)</title>
    <!-- Firebase compat SDK (auth + database) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a1025 0%, #2d1a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(22, 12, 30, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px #ac7ecf40;
            border: 1px solid #b485da30;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(130deg, #f6d0ff, #dbb0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo span {
            background: #7733b3;
            padding: 6px 18px;
            border-radius: 80px;
            font-size: 1.2rem;
            color: white;
            -webkit-text-fill-color: white;
            background: #6d3b9b;
        }
        .auth-area {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2b1938;
            padding: 8px 18px 8px 12px;
            border-radius: 50px;
            border: 1px solid #ab7bd3;
        }
        .user-profile img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #c9a6ff;
        }
        .user-profile span {
            color: #f0dcff;
            font-weight: 500;
        }
        button {
            background: #6b3f9b;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #b17ed8;
            box-shadow: 0 6px 0 #391f4b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:hover {
            background: #8653c2;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #391f4b;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #391f4b;
        }
        button:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 4px 0 #391f4b;
            pointer-events: none;
        }
        .video-section {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin: 30px 0 25px;
        }
        .video-box {
            flex: 1 1 300px;
            background: #110916;
            border-radius: 36px;
            overflow: hidden;
            aspect-ratio: 4/3;
            position: relative;
            border: 2px solid #6a40a0;
            box-shadow: 0 20px 30px -8px black;
        }
        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1e1027;
        }
        .video-label {
            position: absolute;
            bottom: 15px;
            left: 20px;
            background: #230e33ee;
            color: #e9c5ff;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.9rem;
            backdrop-filter: blur(8px);
            border: 1px solid #b17ed8;
            font-weight: 500;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            margin: 30px 0 20px;
        }
        .action-btn {
            background: #2f1b41;
            border: 1px solid #ac74df;
            min-width: 140px;
            box-shadow: 0 5px 0 #1b0f24;
        }
        .action-btn.pause {
            background: #502c6b;
        }
        .status-badge {
            background: #2f1c3e;
            border-radius: 60px;
            padding: 12px 28px;
            color: #cfb0f0;
            font-weight: 500;
            text-align: center;
            border: 1px solid #a06ac9;
            display: inline-block;
        }
        .footer {
            margin-top: 20px;
            color: #a586c0;
            text-align: center;
            font-size: 0.9rem;
        }
        .hidden {
            display: none !important;
        }
        .toast {
            background: #4a2966;
            border-radius: 60px;
            padding: 10px 20px;
            color: #ffdbff;
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- header -->
    <div class="header">
        <div class="logo">
            🌙 lunahappy
            <span>random</span>
        </div>
        <div class="auth-area" id="authArea">
            <!-- filled by js -->
        </div>
    </div>

    <!-- main UI (visible only when logged in) -->
    <div id="chatUI" class="hidden">
        <div class="video-section">
            <div class="video-box">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label">🫵 you</div>
            </div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">👤 stranger</div>
            </div>
        </div>

        <!-- status & controls -->
        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <div class="status-badge" id="connectionStatus">💬 idle</div>
        </div>

        <div class="controls">
            <button class="action-btn" id="findBtn">✨ find partner</button>
            <button class="action-btn" id="skipBtn" disabled>⏭️ skip</button>
            <button class="action-btn pause" id="pauseVideoBtn" disabled>⏸️ pause camera</button>
            <button class="action-btn" id="logoutBtn">🚪 logout</button>
        </div>
        <div class="footer" id="infoMessage">
            ⚡ video is never stored · only peer-to-peer
        </div>
    </div>

    <!-- login prompt (shown when logged out) -->
    <div id="loginUI">
        <div style="text-align: center; padding: 60px 20px;">
            <div style="font-size: 4rem; margin-bottom: 20px;">🌙✨</div>
            <h2 style="color: #f0dcff; font-weight: 400;">sign in to meet strangers</h2>
            <button id="googleLoginBtn" style="margin-top: 30px; font-size: 1.2rem; padding: 16px 40px;">🔐 continue with Google</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== firebase config (provided) ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAHrBE3doAhDni4mcNhylJD8o3r5cNZYSI",
            authDomain: "ls-mannage.firebaseapp.com",
            databaseURL: "https://ls-mannage-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ls-mannage",
            storageBucket: "ls-mannage.firebasestorage.app",
            messagingSenderId: "115534926798",
            appId: "1:115534926798:web:4ea3ab3c1a2d44e2e1d19f",
            measurementId: "G-P2JQH8M41Y"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const provider = new firebase.auth.GoogleAuthProvider();

        // ==================== handle redirect result (important for WebView) ====================
        auth.getRedirectResult().catch((error) => {
            console.warn('Redirect sign-in error:', error);
            // You could show a user-friendly message, but we'll keep silent
        });

        // ==================== DOM elements ====================
        const loginUI = document.getElementById('loginUI');
        const chatUI = document.getElementById('chatUI');
        const authArea = document.getElementById('authArea');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const findBtn = document.getElementById('findBtn');
        const skipBtn = document.getElementById('skipBtn');
        const pauseVideoBtn = document.getElementById('pauseVideoBtn');
        const connectionStatus = document.getElementById('connectionStatus');
        const infoMessage = document.getElementById('infoMessage');
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');

        // ==================== state variables ====================
        let currentUser = null;
        let localStream = null;               // webcam stream
        let peerConnection = null;             // RTCPeerConnection
        let remoteStream = new MediaStream();  // we'll add tracks later
        remoteVideo.srcObject = remoteStream;

        // firebase paths & listeners
        let waitingRef = null;                 // reference to /waiting
        let roomRef = null;                    // reference to active room
        let currentRoomId = null;
        let partnerId = null;

        // paused flag
        let videoPaused = false;
        let localVideoTrack = null;

        // ==================== auth UI update ====================
        function updateAuthUI(user) {
            authArea.innerHTML = '';
            if (user) {
                const profileDiv = document.createElement('div');
                profileDiv.className = 'user-profile';
                profileDiv.innerHTML = `
                    <img src="${user.photoURL || 'https://www.gstatic.com/mobilesdk/190424_mobilesdk/default_user.jpg'}" alt="avatar">
                    <span>${user.displayName || 'user'}</span>
                `;
                authArea.appendChild(profileDiv);
            } else {
                authArea.innerHTML = `<div class="toast">not signed in</div>`;
            }
        }

        // ==================== login / logout (redirect version) ====================
        googleLoginBtn.addEventListener('click', async () => {
            try {
                // Use redirect to keep login inside the WebView
                await auth.signInWithRedirect(provider);
                // The page will redirect to Google and then back to our app
            } catch (e) {
                alert('login failed: ' + e.message);
            }
        });

        logoutBtn.addEventListener('click', async () => {
            await cleanupBeforeSignout();
            auth.signOut();
        });

        async function cleanupBeforeSignout() {
            // stop camera, close connections, remove from waiting/rooms
            await stopAllChat();
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
                localVideo.srcObject = null;
            }
        }

        // ==================== auth state observer ====================
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            updateAuthUI(user);
            if (user) {
                loginUI.classList.add('hidden');
                chatUI.classList.remove('hidden');
                // init local webcam
                await initLocalStream();
            } else {
                loginUI.classList.remove('hidden');
                chatUI.classList.add('hidden');
                // clean up everything
                await stopAllChat();
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                    localVideo.srcObject = null;
                }
                if (peerConnection) peerConnection.close();
                peerConnection = null;
                remoteStream = new MediaStream();
                remoteVideo.srcObject = remoteStream;
                connectionStatus.innerText = '💤 signed out';
            }
        });

        // ==================== local camera ====================
        async function initLocalStream() {
            if (localStream) return;
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                localVideo.srcObject = localStream;
                localVideoTrack = localStream.getVideoTracks()[0];
                // update pause button state
                pauseVideoBtn.disabled = false;
                videoPaused = false;
                pauseVideoBtn.innerHTML = '⏸️ pause camera';
            } catch (e) {
                infoMessage.innerText = '⚠️ cannot access camera: ' + e.message;
            }
        }

        // ==================== pause / resume video ====================
        pauseVideoBtn.addEventListener('click', () => {
            if (!localVideoTrack) return;
            if (videoPaused) {
                localVideoTrack.enabled = true;
                videoPaused = false;
                pauseVideoBtn.innerHTML = '⏸️ pause camera';
            } else {
                localVideoTrack.enabled = false;
                videoPaused = true;
                pauseVideoBtn.innerHTML = '▶️ resume camera';
            }
        });

        // ==================== core chat logic ====================
        async function stopAllChat() {
            // remove any waiting entry
            if (waitingRef && currentUser) {
                await database.ref(`waiting/${currentUser.uid}`).remove();
                waitingRef = null;
            }
            // leave room if any
            if (roomRef && currentRoomId && currentUser) {
                await database.ref(`rooms/${currentRoomId}/participants/${currentUser.uid}`).remove();
                roomRef = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            // clear remote stream
            remoteStream.getTracks().forEach(t => t.stop());
            remoteStream = new MediaStream();
            remoteVideo.srcObject = remoteStream;

            currentRoomId = null;
            partnerId = null;
            connectionStatus.innerText = '💬 idle';
            skipBtn.disabled = true;
            findBtn.disabled = false;
        }

        // find random partner
        findBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            await stopAllChat(); // ensure clean state
            connectionStatus.innerText = '🔎 looking for someone...';
            findBtn.disabled = true;

            try {
                // try to claim a waiting user (transaction style)
                const waitingSnapshot = await database.ref('waiting').once('value');
                const waiting = waitingSnapshot.val();
                let otherUserId = null;
                if (waiting) {
                    // pick first that is not current user
                    const entries = Object.entries(waiting);
                    for (let [uid, data] of entries) {
                        if (uid !== currentUser.uid) {
                            otherUserId = uid;
                            break;
                        }
                    }
                }

                if (otherUserId) {
                    // we found someone waiting: remove them from waiting and create a room
                    await database.ref(`waiting/${otherUserId}`).remove();
                    // create unique room id
                    const roomId = `room_${Date.now()}_${Math.random().toString(36).substring(2)}`;
                    const roomData = {
                        participants: {
                            [currentUser.uid]: true,
                            [otherUserId]: true
                        },
                        createdAt: firebase.database.ServerValue.TIMESTAMP
                    };
                    await database.ref(`rooms/${roomId}`).set(roomData);
                    // set up onDisconnect cleanup for both participants
                    database.ref(`rooms/${roomId}/participants/${currentUser.uid}`).onDisconnect().remove();
                    database.ref(`rooms/${roomId}/participants/${otherUserId}`).onDisconnect().remove();

                    currentRoomId = roomId;
                    roomRef = database.ref(`rooms/${roomId}`);
                    partnerId = otherUserId;

                    connectionStatus.innerText = '✅ connecting to stranger...';
                    // initiate peer connection as offerer
                    await createPeerConnection(true, roomId, otherUserId);
                } else {
                    // no one waiting -> add ourselves to waiting
                    waitingRef = database.ref(`waiting/${currentUser.uid}`);
                    await waitingRef.set({ timestamp: firebase.database.ServerValue.TIMESTAMP });
                    waitingRef.onDisconnect().remove();
                    connectionStatus.innerText = '⏳ waiting for a partner...';
                    // listen for when someone creates a room with us
                    listenForRoomCreation();
                }
            } catch (e) {
                console.error(e);
                connectionStatus.innerText = '⚠️ error finding partner';
                findBtn.disabled = false;
            }
        });

        // when we are waiting, we need to detect when a room containing us appears
        function listenForRoomCreation() {
            if (!currentUser) return;
            const roomsQuery = database.ref('rooms').orderByChild(`participants/${currentUser.uid}`).equalTo(true);
            roomsQuery.on('child_added', async (snapshot) => {
                const roomId = snapshot.key;
                const room = snapshot.val();
                if (!room.participants) return;
                // ensure we are not already in a room
                if (currentRoomId) return;
                // find partner id
                const participants = Object.keys(room.participants);
                const other = participants.find(uid => uid !== currentUser.uid);
                if (!other) return;

                // stop waiting listener, remove waiting entry
                roomsQuery.off('child_added');
                if (waitingRef) {
                    await waitingRef.remove();
                    waitingRef = null;
                }

                currentRoomId = roomId;
                roomRef = database.ref(`rooms/${roomId}`);
                partnerId = other;
                connectionStatus.innerText = '✅ connecting... (answerer)';

                // create peer connection as answerer
                await createPeerConnection(false, roomId, other);
            });
        }

        // ==================== WebRTC ====================
        async function createPeerConnection(isOfferer, roomId, remoteUid) {
            if (!localStream) await initLocalStream();
            if (!localStream) return;

            const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
            peerConnection = new RTCPeerConnection(config);

            // add local tracks
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });

            // receive remote tracks
            peerConnection.ontrack = (event) => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                });
            };

            // ICE candidates handling
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    // send candidate to firebase under room/ signaling
                    if (currentRoomId) {
                        database.ref(`rooms/${currentRoomId}/candidates/${currentUser.uid}`).push(event.candidate.toJSON());
                    }
                }
            };

            // listen for remote candidates
            const candidatesRef = database.ref(`rooms/${roomId}/candidates/${remoteUid}`);
            candidatesRef.on('child_added', (snapshot) => {
                const candidate = new RTCIceCandidate(snapshot.val());
                peerConnection.addIceCandidate(candidate).catch(e => console.warn('add ice error', e));
            });

            // connection state change
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    connectionStatus.innerText = '🎥 connected!';
                    skipBtn.disabled = false;
                } else if (peerConnection.connectionState === 'disconnected' || peerConnection.connectionState === 'failed') {
                    connectionStatus.innerText = '❌ disconnected';
                    skipBtn.disabled = true;
                }
            };

            // signaling: offer / answer
            const signalingRef = database.ref(`rooms/${roomId}/signaling`);

            if (isOfferer) {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                // send offer
                await signalingRef.set({ offer: offer.toJSON(), answer: null });
                // wait for answer
                signalingRef.on('value', async (snap) => {
                    const data = snap.val();
                    if (data && data.answer && !peerConnection.currentRemoteDescription) {
                        const answer = new RTCSessionDescription(data.answer);
                        await peerConnection.setRemoteDescription(answer);
                    }
                });
            } else {
                // answerer: wait for offer
                signalingRef.on('value', async (snap) => {
                    const data = snap.val();
                    if (data && data.offer && !peerConnection.currentRemoteDescription) {
                        const offer = new RTCSessionDescription(data.offer);
                        await peerConnection.setRemoteDescription(offer);
                        const answer = await peerConnection.createAnswer();
                        await peerConnection.setLocalDescription(answer);
                        // send answer
                        await signalingRef.update({ answer: answer.toJSON() });
                    }
                });
            }

            // onDisconnect cleanups for room signaling
            database.ref(`rooms/${roomId}/candidates/${currentUser.uid}`).onDisconnect().remove();
            database.ref(`rooms/${roomId}/signaling`).onDisconnect().remove();
        }

        // ==================== skip button ====================
        skipBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            await stopAllChat();
            findBtn.disabled = false;
            connectionStatus.innerText = '💬 idle (click find)';
        });

        // ==================== on page unload / clean ====================
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                // best-effort cleanup
                if (waitingRef) waitingRef.remove();
                if (roomRef && currentRoomId) {
                    database.ref(`rooms/${currentRoomId}/participants/${currentUser.uid}`).remove();
                }
            }
        });

        // Initial UI state
        if (!auth.currentUser) {
            loginUI.classList.remove('hidden');
            chatUI.classList.add('hidden');
        } else {
            // will be triggered by onAuthStateChanged
        }
    })();
</script>
</body>
</html>
